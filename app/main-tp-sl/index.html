<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        div.hidden{display:none;}
        #preview iframe{width:100%;}
        .form-line{
            padding:0.5em;box-sizing:border-box;
        }
        .form-line label{font-size: 10pt;}
    </style>
    <script src="/scripts/mainfunc.js"></script>
    <script src="/scripts/htmlhighlighter.js"></script>
    <script>
        const ptype='app';
        const tpsl={
            main_run:function(){},
            reset:function(){}
        }
        gen.head.font.exec();gen.head.style.exec();gen.head.met.exec();
    </script>
</head>
<body>
    <div class="container">
        <h1 class="title">Penghitungan TP/SL otomatis</h1>
        <div class="form-container">
            <div class="form-line">
                <label for="currency">Mata uang</label>
                <select name='currency'>
                    <option value='eurusd'>EURUSD</option>
                </select>
            </div>
            <div class="form-line">
                <label for="openprice">Open price</label>
                <input type="text" id="openprice" name="openprice">
            </div>
            <button class="type-1-btn" onclick="">Generate!</button>
        </div>
        <section id="result">
            <div class='code'>
                <h2 class='inH'>Kode</h2>
                <pre id='code-container-cover'><code id='code-container'></code></pre>
            </div>
            <div class='preview'>
                <h2 class='inH'>Preview</h2>
                <div id='preview'>
                </div>
            </div>
        </section>
        <button class="type-1-btn" onclick="tpsl.reset()">Atur ulang</button>
    </div>
    <script>gen.nav();gen.nav('footer');gen.head.title();tpsl.colorvalue();</script>
</body>
</html>
