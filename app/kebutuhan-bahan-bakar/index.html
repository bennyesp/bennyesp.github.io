<!DOCTYPE html>
<html lang="id">
<head>
    <script src="/scripts/mainfunc.js"></script>
    <script>
        const field={
            hitung:function(){
                let a=parseInt(document.getElementById('konsum').value),b=parseInt(document.getElementById('jarak').value),r=document.getElementById('result'),k;
                if(a&&b){
                    k=b/a;
                    r.textContent=`<table>
                        <tr>
                            <td>Konsumsi BBM</td>
                            <td class="titik2">:</td>
                            <td>${a} km/l</td>
                        </tr>
                        <tr>
                            <td>Jarak</td>
                            <td class="titik2">:</td>
                            <td>${b} km</td>
                        </tr>
                        <tr>
                            <td>Kebutuhan BBM</td>
                            <td class="titik2">:</td>
                            <td>${b} km ÷ ${a} km/l</td>
                        <tr>
                            <td></td>
                            <td></td>
                          <td class='numres'>= ${k} liter</div></td>
                        </tr>
                        </table>`;
                }
            },
            clear:function(){document.getElementById('konsum').value=document.getElementById('jarak').value=document.getElementById('result').textContent='';}
        }
    </script>
</head>
<body>
    <div class="container">
        <h1 class="title">Kebutuhan bahan bakar</h1>
        <div class="form-container">
            <div class="form-line">
                <label for="konsum">Konsumsi BBM</label>
                <input type="number" id="konsum" name="konsum"> km/l
            </div>
            <div class="form-line">
                <label for="jarak">Jarak</label>
                <input type="number" id="jarak" name="jarak"> km
            </div>
            <button class="type-1-btn" onclick="field.hitung()">Hitung</button>
        </div>
        <section id="result"></section>
        <button class="type-1-btn" onclick="field.clear()">Bersihkan</button>
    </div>
    <script>var ptype='app';gen.head.font.exec();gen.head.style.exec();gen.head.met.exec();gen.head.title();gen.nav();gen.nav('footer');</script>
</body>
</html>
