<!DOCTYPE html>
<html lang="id">
<head>
    <script src="/scripts/mainfunc.js"></script>
    <script>
        const ptype='app';
        const ppn=0.11;
        const field={
            ppn:function(){
                let ha=parseInt(document.getElementById('harga').value),r=document.getElementById('result'),pp,hp;
                if(ha<=0||!ha){r.innerHTML='<i class="forbidden">Masukkan harga!</i>'}
                else{
                    pp=ppn*ha;
                    ppp=pp.toLocaleString('id');
                    hp=ha+pp;
                    hap=ha.toLocaleString('id');
                    hpp=hp.toLocaleString('id');
                    r.innerHTML=`harga setelah PPN 11% = harga awal + (harga awal × ppn 11%)<br>= Rp${hap} + (Rp${hap} × 11%)<br>Rp${hap} + Rp${ppp}<div class='numres'>= Rp${hpp}</div>`;
                }
            },
            clear:function(){document.getElementById('harga').value=document.getElementById('result').textContent='';}
        }
        gen.head.font.exec();gen.head.style.exec();gen.head.met.exec();
    </script>
</head>
<body>
    <div class="container">
        <h1 class="title">Generator iframe</h1>
        <div class="form-container">
            <div class="form-line">
                <label for="harga">Source</label>
                <input type="text" id="source" name="source">
            </div>
            <div class="form-line">
                <label for="theclass">class</label>
                <input type="text" id="theclass" name="theclass">
            </div>
            <div class="form-line">
                <label for="srcdoc">srcdoc</label>
                <input type="checkbox" id="srcdoc" name="srcdoc" onclick="">
            </div>
            <div class="form-line" id='default-srcdoc-cover'>
                <label for="defaultsrcdoc">default srcdoc</label>
                <input type="checkbox" checked id="defaultsrcdoc" name="defaultsrcdoc" onchange="">
            </div>
            <div class="form-line" id='custom-srcdoc-cover'>
                <label for="customsrcdoc">custom srcdoc</label>
                <input type="text" checked id="customsrcdoc" name="customsrcdoc">
            </div>
            <button class="type-1-btn" onclick="">Generate!</button>
        </div>
        <section id="result"></section>
        <button class="type-1-btn" onclick="field.clear()">Bersihkan</button>
    </div>
    <script>gen.nav();gen.nav('footer');gen.head.title();</script>
</body>
</html>
